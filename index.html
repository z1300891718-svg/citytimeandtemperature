<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球城市 & 中国省会实时气温</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --accent-blue: #003399;
            --accent-green: #27ae60;
            --accent-orange: #d35400;
            --china-red: #c0392b;
        }

        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        header { text-align: center; margin-bottom: 30px; position: sticky; top: 0; background: var(--bg-color); z-index: 100; padding: 10px; border-bottom: 1px solid #ddd; }
        h1 { margin: 0; font-size: 1.6em; }
        
        .continent-section { margin-bottom: 40px; }
        .continent-title { 
            font-size: 1.4em; border-left: 6px solid var(--accent-blue); 
            padding-left: 12px; margin-bottom: 15px; background: #e9ecef; 
            padding-top: 5px; padding-bottom: 5px; border-radius: 4px;
        }

        .oceania-style { border-left-color: #ffcd00; background: #fff9e6; }
        .china-style { border-left-color: var(--china-red); background: #fdf2f2; }

        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 10px; 
        }

        .card { 
            background: var(--card-bg); border-radius: 8px; padding: 10px; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.05); transition: all 0.3s ease;
            border: 1px solid #eee;
        }

        .city-name { font-size: 0.95em; font-weight: bold; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .label-tag { font-size: 0.7em; color: #7f8c8d; margin-bottom: 6px; display: block; }
        .info-row { display: flex; justify-content: space-between; margin-top: 5px; font-size: 0.8em; }
        .time-val { color: var(--accent-orange); font-weight: 500; }
        .temp-val { color: var(--accent-green); font-weight: bold; font-size: 1.1em; }

        #loading-overlay { text-align: center; padding: 40px; font-style: italic; color: #666; }
    </style>
</head>
<body>

<header>

    <div style="font-size: 0.8em; color: #888; margin-top: 5px;">大洋洲置顶(已加珀斯) · 中国省会置底 · 组内按气温降序</div>
</header>

<div id="loading-overlay">正在同步全球天气数据并排序...</div>
<div id="content"></div>

    ]
};

async function fetchAllWeather() {
    const promises = [];
    for (const category in cityLibrary) {
        cityLibrary[category].forEach(city => {
            const p = fetch(`https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&current_weather=true`)
                .then(res => res.json())
                .then(data => {
                    city.temp = data.current_weather.temperature;
                })
                .catch(() => city.temp = -999);
            promises.push(p);
        });
    }
    await Promise.all(promises);
    renderDashboard();
}

function getLocalTime(tz) {
    return new Date().toLocaleTimeString('zh-CN', { 
        timeZone: tz, hour12: false, hour: '2-digit', minute: '2-digit'
    });
}

function renderDashboard() {
    const container = document.getElementById('content');
    const loader = document.getElementById('loading-overlay');
    if(loader) loader.remove();
    container.innerHTML = '';

    for (const [category, cities] of Object.entries(cityLibrary)) {
        // 核心：按温度降序排序
        cities.sort((a, b) => b.temp - a.temp);

        const section = document.createElement('div');
        section.className = 'continent-section';
        let titleClass = "continent-title";
        if (category.includes("大洋洲")) titleClass += " oceania-style";
        if (category.includes("中国")) titleClass += " china-style";
        
        section.innerHTML = `<div class="${titleClass}">${category}</div>`;
        const grid = document.createElement('div');
        grid.className = 'grid-container';

        cities.forEach(city => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="city-name">${city.name}</span>
                <span class="label-tag">${city.label}</span>
                <div class="info-row">
                    <span class="time-val">${getLocalTime(city.tz)}</span>
                    <span class="temp-val">${city.temp === -999 ? '--' : Math.round(city.temp) + '°C'}</span>
                </div>
            `;
            grid.appendChild(card);
        });
        section.appendChild(grid);
        container.appendChild(section);
    }
}

fetchAllWeather();
// 每一分钟刷新一次界面
setInterval(renderDashboard, 60000);
</script>
</body>
